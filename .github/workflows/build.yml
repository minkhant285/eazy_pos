name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── macOS (native ARM64 + x64 universal DMG) ──────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build Mac
        run: yarn build:mac

      - name: Upload Mac DMG
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/*.dmg

  # ── Windows x64 (native build on Windows runner) ─────────────
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build Windows
        run: yarn build:win

      - name: Upload Windows Setup
        uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: dist/*.exe
